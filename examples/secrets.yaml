# Example Home Assistant secrets for the Monarch Money REST sensors.
#
# Home Assistant reads secrets from a file named `secrets.yaml` in your main
# config directory (the same folder as configuration.yaml). Copy the keys below
# into THAT file and replace the placeholder values with your own. Then the
# sensors in homeassistant-rests.yaml reference them via `!secret <key>`.
#
# Do NOT commit your real secrets.yaml to source control.
#
# Why whole strings live here (not just the host/IP and account names):
# Home Assistant's `!secret` tag replaces an ENTIRE value and cannot be spliced
# into the middle of a string, and Jinja templates (resource_template /
# value_template) cannot read secrets at all. So to keep the base URL and the
# account displayNames out of the (public) rests.yaml, the full resource URL and
# the full per-account template are stored here instead.
#
# Replace <HA_HOST_IP> with your Home Assistant host's LAN IP (REST sensors run
# in HA Core, which can't reach the add-on at localhost — it reaches it via the
# host IP + the published port 8000).

# --- Resource URLs (base host/port kept private) ----------------------------
monarch_balance_resource: "http://<HA_HOST_IP>:8000/api/balance"
monarch_cashflow_resource: "http://<HA_HOST_IP>:8000/api/cashflow"
monarch_auth_resource: "http://<HA_HOST_IP>:8000/api/auth/status"

# resource_template: the {{ }} are rendered by HA at poll time (stored here as a
# plain string). Injects a rolling last-7-days date range.
monarch_transactions_resource: >-
  http://<HA_HOST_IP>:8000/api/transactions?limit=500&start_date={{ (now() - timedelta(days=6)).strftime('%Y-%m-%d') }}&end_date={{ now().strftime('%Y-%m-%d') }}

# --- Per-account value templates (account displayName kept private) ---------
# Replace each '<... DISPLAY NAME>' with the account's exact displayName. Run the
# add-on's /api/accounts once to see the exact names. displayBalance falls back
# to currentBalance when null.
monarch_joint_savings_balance_template: >-
  {% set a = value_json.accounts | selectattr('displayName', 'eq', '<JOINT SAVINGS DISPLAY NAME>') | first | default({}) %}
  {{ (a.displayBalance if a.displayBalance is not none else a.currentBalance) | default(0) | round(2) }}

