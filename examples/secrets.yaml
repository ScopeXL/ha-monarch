  {% set a = value_json.accounts | selectattr('displayName', 'eq', '<JOINT CHECKING DISPLAY NAME>') | first | default({}) %}
  {{ (a.displayBalance if a.displayBalance is not none else a.currentBalance) | default(0) | round(2) }}

