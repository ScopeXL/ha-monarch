# --- Auth health ------------------------------------------------------------
# /api/auth/status just reports the add-on's in-memory login state
# (pending | awaiting_mfa | error | ready) and does NOT call Monarch, so it's
# cheap to poll often. "on" = session is ready; "off" = needs attention (e.g.
# awaiting_mfa after a restart, or an error). If the add-on is down/unreachable
# the request fails and the sensor goes "unavailable". The status/message are
# exposed as attributes so you can see *why* it isn't ready.
- resource: "http://localhost:8000/api/auth/status"
  scan_interval: 60
  # In the `rest:` integration, json_attributes is only valid on a `sensor`
  # (not on binary_sensor, and not at the resource level). So the raw status +
  # message live on the status sensor, and the binary_sensor below derives a
  # simple ready/not-ready from the same fetch.
  sensor:
    - name: "Monarch Auth Status"
      unique_id: monarch_auth_status
      value_template: "{{ value_json.status }}"   # pending | awaiting_mfa | error | ready
      json_attributes:
        - status
        - message
      icon: mdi:shield-account
  binary_sensor:
    - name: "Monarch API Ready"
      unique_id: monarch_api_ready
      device_class: connectivity
      value_template: "{{ value_json.status == 'ready' }}"
