        {% set day = (now() - timedelta(days=3)).strftime('%Y-%m-%d') %}
        {% set txns = value_json.allTransactions.results | default([]) %}
        {{ ((txns | selectattr('amount','lt',0) | selectattr('date','eq',day)
            | sum(attribute='amount')) * -1) | round(2) }}

    - name: "Monarch Spend 4 Days Ago"
      unique_id: monarch_spend_4_days_ago
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:cash-minus
      value_template: >-
        {% set day = (now() - timedelta(days=4)).strftime('%Y-%m-%d') %}
        {% set txns = value_json.allTransactions.results | default([]) %}
        {{ ((txns | selectattr('amount','lt',0) | selectattr('date','eq',day)
            | sum(attribute='amount')) * -1) | round(2) }}

    - name: "Monarch Spend 5 Days Ago"
      unique_id: monarch_spend_5_days_ago
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:cash-minus
      value_template: >-
        {% set day = (now() - timedelta(days=5)).strftime('%Y-%m-%d') %}
        {% set txns = value_json.allTransactions.results | default([]) %}
        {{ ((txns | selectattr('amount','lt',0) | selectattr('date','eq',day)
            | sum(attribute='amount')) * -1) | round(2) }}

    - name: "Monarch Spend 6 Days Ago"
      unique_id: monarch_spend_6_days_ago
