# Example Home Assistant REST sensors for the Monarch Money add-on.
#
# Drop these into your HA config. If you split config with
#   rest: !include rests.yaml
# then paste the list items below into rests.yaml (it's a list of resources).
# Otherwise nest them under a top-level `rest:` key in configuration.yaml.
#
# Your account displayNames are kept out of this file via `!secret` — the
# per-account value templates live in secrets.yaml. Copy the keys from
# examples/secrets.yaml into your HA secrets.yaml and fill in your real account
# names. (HA's `!secret` can only replace a whole value and can't be read inside
# a Jinja template, so each full per-account template is stored as its own
# secret rather than just the account name.)
#
# The resource URLs below point at localhost:8000. If your REST sensors run in
# HA Core (which can't reach the add-on at localhost), change localhost to the
# add-on host's LAN IP + published port 8000.
#
# Endpoints return HTTP 503 until the one-time MFA login is done in the add-on
# dashboard. Until then these sensors read "unknown" — they recover on their own
# once auth is ready. Keep scan_interval generous; every poll hits Monarch's API.

# --- Net worth + per-account balances (ONE fetch feeds all of these) --------
- resource: "http://localhost:8000/api/balance"
  scan_interval: 3600
  sensor:
    - name: "Monarch Net Worth"
      unique_id: monarch_net_worth
      value_template: "{{ value_json.totals.net | round(2) }}"
      unit_of_measurement: USD
      device_class: monetary
      state_class: total

    - name: "Monarch Assets"
      unique_id: monarch_assets
      value_template: "{{ value_json.totals.assets | round(2) }}"
      unit_of_measurement: USD
      device_class: monetary
      state_class: total

    - name: "Monarch Liabilities"
      unique_id: monarch_liabilities
      value_template: "{{ value_json.totals.liabilities | round(2) }}"
      unit_of_measurement: USD
      device_class: monetary
      state_class: total

    # --- Per-account balances -------------------------------------------------
    # Each value_template filters the accounts array by displayName; those
    # templates (with the account names) live in secrets.yaml. Edit the names
    # there (run /api/accounts once to see the exact names), and add a sensor +
    # matching secret per account you care about.
    - name: "Monarch Joint Savings Account Balance"
      unique_id: monarch_joint_savings_balance
      value_template: !secret monarch_joint_savings_balance_template
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:cash

    - name: "Monarch Joint Checking Account Balance"
      unique_id: monarch_joint_checking_balance
      value_template: !secret monarch_joint_checking_balance_template
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:cash

    - name: "Monarch Amazon Credit Card Balance"
      unique_id: monarch_amazon_credit_card_balance
      value_template: !secret monarch_amazon_cc_balance_template
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:credit-card

    - name: "Monarch Chase Credit Card Balance"
      unique_id: monarch_chase_credit_card_balance
      value_template: !secret monarch_chase_cc_balance_template
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:credit-card

    - name: "Monarch Amazon Credit Card Limit"
      unique_id: monarch_amazon_credit_card_limit
      value_template: !secret monarch_amazon_cc_limit_template
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:credit-card-lock

    - name: "Monarch Chase Credit Card Limit"
      unique_id: monarch_chase_credit_card_limit
      value_template: !secret monarch_chase_cc_limit_template
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:credit-card-lock

# --- Cashflow (income / expenses / savings) ---------------------------------
- resource: "http://localhost:8000/api/cashflow"
  scan_interval: 3600
  sensor:
    - name: "Monarch Income (Month)"
      unique_id: monarch_income
      value_template: "{{ value_json.summary[0].summary.sumIncome | round(2) }}"
      unit_of_measurement: USD
      device_class: monetary
      state_class: total

    - name: "Monarch Expenses (Month)"
      unique_id: monarch_expenses
      # sumExpense is negative in Monarch; abs() makes it a positive spend figure.
      value_template: "{{ (value_json.summary[0].summary.sumExpense | float | abs) | round(2) }}"
      unit_of_measurement: USD
      device_class: monetary
      state_class: total

    - name: "Monarch Savings (Month)"
      unique_id: monarch_savings
      value_template: "{{ value_json.summary[0].summary.savings | round(2) }}"
      unit_of_measurement: USD
      device_class: monetary
      state_class: total

    - name: "Monarch Savings Rate"
      unique_id: monarch_savings_rate
      # savingsRate is a 0..1 fraction; *100 for a percentage.
      value_template: "{{ (value_json.summary[0].summary.savingsRate | float * 100) | round(1) }}"
      unit_of_measurement: "%"
      state_class: measurement

# --- Daily spending, last 7 days --------------------------------------------
# ONE fetch of the last 7 days of transactions (resource_template injects the
# date range each poll), then 7 sensors each sum that day's outflows. "Spend" =
# sum of negative amounts (expenses are negative in Monarch), flipped positive.
# Recomputed from source every poll, so late-posting/recategorized transactions
# stay accurate across all 7 days. limit=500 is plenty for a week.
- resource_template: >-
    http://localhost:8000/api/transactions?limit=500&start_date={{ (now() - timedelta(days=6)).strftime('%Y-%m-%d') }}&end_date={{ now().strftime('%Y-%m-%d') }}
  scan_interval: 3600
  sensor:
    - name: "Monarch Spend Today"
      unique_id: monarch_spend_today
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:cash-minus
      value_template: >-
        {% set day = now().strftime('%Y-%m-%d') %}
        {% set txns = value_json.allTransactions.results | default([]) %}
        {{ ((txns | selectattr('amount','lt',0) | selectattr('date','eq',day)
            | sum(attribute='amount')) * -1) | round(2) }}

    - name: "Monarch Spend 1 Day Ago"
      unique_id: monarch_spend_1_day_ago
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:cash-minus
      value_template: >-
        {% set day = (now() - timedelta(days=1)).strftime('%Y-%m-%d') %}
        {% set txns = value_json.allTransactions.results | default([]) %}
        {{ ((txns | selectattr('amount','lt',0) | selectattr('date','eq',day)
            | sum(attribute='amount')) * -1) | round(2) }}

    - name: "Monarch Spend 2 Days Ago"
      unique_id: monarch_spend_2_days_ago
      unit_of_measurement: USD
      device_class: monetary
      state_class: total
      icon: mdi:cash-minus
