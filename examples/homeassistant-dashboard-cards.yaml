# Example Lovelace dashboard cards for the Monarch Money sensors defined in
# examples/homeassistant-rests.yaml:
#   - Daily spending: sensor.monarch_spend_today ... _6_days_ago
#   - Recent transactions: sensor.monarch_recent_transactions (results attribute)
#
# Paste a card into a dashboard via the UI (Edit dashboard -> Add card ->
# Manual / "Show code editor"), or into a YAML-mode dashboard. Each numbered
# OPTION below is a standalone card — copy one, not the whole file.

# ============================================================================
# OPTION A — ApexCharts card (best looking; requires the ApexCharts Card from
# HACS: https://github.com/RomRider/apexcharts-card).
# A data_generator maps the 7 rolling sensors onto real calendar dates, so you
# get one bar per day with proper date labels.
# ============================================================================
type: custom:apexcharts-card
header:
  show: true
  title: Daily Spending (Last 7 Days)
graph_span: 7d
span:
  end: day
series:
  # entity is required by apexcharts-card even with a data_generator; it drives
  # the card's refresh. The generator below pulls all 7 sensors via hass.states.
  - entity: sensor.monarch_spend_today
    name: Spend
    type: column
    unit: $
    data_generator: |
      const ids = [
        'sensor.monarch_spend_today',
        'sensor.monarch_spend_1_day_ago',
        'sensor.monarch_spend_2_days_ago',
        'sensor.monarch_spend_3_days_ago',
        'sensor.monarch_spend_4_days_ago',
        'sensor.monarch_spend_5_days_ago',
        'sensor.monarch_spend_6_days_ago',
      ];
      return ids.map((id, i) => {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        d.setDate(d.getDate() - i);          // i days ago
        const s = hass.states[id];
        const v = s ? Number(s.state) : 0;
        return [d.getTime(), isNaN(v) ? 0 : v];
      });

# ============================================================================
# OPTION B — No custom cards needed. A plain Entities card listing the 7 days.
# Less pretty, but works on a stock Home Assistant install.
# ============================================================================
type: entities
title: Daily Spending (Last 7 Days)
entities:
  - entity: sensor.monarch_spend_today
    name: Today
  - entity: sensor.monarch_spend_1_day_ago
    name: 1 day ago
  - entity: sensor.monarch_spend_2_days_ago
    name: 2 days ago
  - entity: sensor.monarch_spend_3_days_ago
    name: 3 days ago
  - entity: sensor.monarch_spend_4_days_ago
    name: 4 days ago
  - entity: sensor.monarch_spend_5_days_ago
    name: 5 days ago
  - entity: sensor.monarch_spend_6_days_ago
    name: 6 days ago

# ============================================================================
# RECENT TRANSACTIONS (last 10) — reads the `results` list attribute on
# sensor.monarch_recent_transactions. Both options below are commented out;
# uncomment ONE and paste it as its own card.
# ============================================================================

# --- OPTION C — flex-table-card (clean, modern table; requires the
# flex-table-card from HACS: https://github.com/custom-cards/flex-table-card).
# Each element of the `results` array becomes a row; `x` is that element.
# ----------------------------------------------------------------------------
type: custom:flex-table-card
title: Recent Transactions
clickable: false
entities:
  include: sensor.monarch_recent_transactions
columns:
  # modify values are JS expressions. They MUST be quoted — the ternary's
  # ` : ` would otherwise be read as YAML mapping syntax and fail to parse.
  - name: Date
    data: results
    modify: "x.date"
  - name: Merchant
    data: results
    modify: "x.merchant ? x.merchant.name : ''"
  - name: Category
    data: results
    modify: "x.category ? x.category.name : ''"
  - name: Amount
    data: results
    align: right
    # Monarch amounts are negative for spend; show a signed dollar figure.
    modify: "(x.amount < 0 ? '-$' : '+$') + Math.abs(parseFloat(x.amount)).toFixed(2)"

# --- OPTION D — Markdown card (no custom cards; works on a stock HA install).
# Iterates the same attribute into a simple table.
# ----------------------------------------------------------------------------
type: markdown
title: Recent Transactions
content: |-
  {% set rows = state_attr('sensor.monarch_recent_transactions', 'results') or [] -%}
  | Date | Merchant | Amount |
  |------|----------|-------:|
  {% for t in rows -%}
  | {{ t.date }} | {{ t.merchant.name if t.merchant else '—' }} | {{ '%+.2f' | format(t.amount | float(0)) }} |
  {% endfor -%}
